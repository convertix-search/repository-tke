{% extends 'core/base.html' %}
{% load static sekizai_tags %}

{% block content %}

    <div id="lead-form">

        <div class="body">
            <div class="container">

                <div class="d-flex align-items-center justify-content-center mb-5">
                    <img src="{% static 'core/images/confirm-styleB.png' %}" class="mr-5" width="100" alt="confirmation Thyssenkrupp lead form">
                    <div>
                        <h3 class="mb-3" style="font-size: 20px;">Your request has been sent!</h3>
                        <p class="mb-0" style="font-size: 18px;">We will contact you as soon as possible.</p>
                    </div>
                </div>

            </div>
        </div>
    </div>


    {% if form_answered.form.external_thank_you_page %}
        {% addtoblock 'js' %}
            <script>
                window.location.href = "{{ form_answered.form.external_thank_you_page }}";
                {#window.top.location.href = "{{ form_answered.form.external_thank_you_page }}";#}
            </script>
        {% endaddtoblock %}
    {% endif %}

{% endblock %}
